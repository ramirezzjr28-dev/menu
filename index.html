<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perros Calientes 🌭</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --rojo:#e63946; --amarillo:#ffd60a; --crema:#fff8e7; --oscuro:#0d0d0d; --neon:#ff6b35; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--oscuro); color:var(--crema); font-family:'Barlow',sans-serif; overflow-x:hidden; }

        header {
            position:fixed; top:0; left:0; right:0; z-index:100;
            display:flex; align-items:center; justify-content:center; padding:14px 40px;
            background:linear-gradient(to bottom,rgba(13,13,13,0.98),transparent);
        }
        .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:.12em; color:var(--amarillo); text-shadow:0 0 20px rgba(255,214,10,.5); }
        .logo span { color:var(--rojo); }

        .seccion-perro {
            height:100vh; display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            padding:80px 20px 20px; position:relative; overflow:hidden;
        }
        .seccion-perro:not(:last-child)::after {
            content:''; position:absolute; bottom:0; left:10%; right:10%; height:1px;
            background:linear-gradient(to right,transparent,var(--rojo),transparent);
            box-shadow:0 0 8px var(--rojo);
        }
        .num-fondo {
            position:absolute; font-family:'Bebas Neue',sans-serif;
            font-size:clamp(160px,28vw,320px); color:rgba(255,255,255,.025);
            user-select:none; pointer-events:none; z-index:0;
        }
        .info-perro { position:relative; z-index:2; text-align:center; margin-bottom:10px; }
        .tag {
            display:inline-block; background:var(--rojo); color:white; font-size:.7rem;
            font-weight:700; letter-spacing:.15em; text-transform:uppercase;
            padding:4px 14px; border-radius:2px; margin-bottom:12px;
        }
        h2 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,7vw,5rem); letter-spacing:.05em; line-height:1; color:var(--crema); text-shadow:2px 2px 0 var(--rojo); }
        .descripcion { font-size:clamp(.9rem,2vw,1.1rem); color:rgba(255,248,231,.65); margin-top:8px; max-width:420px; font-style:italic; }
        .precio { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,4vw,2.8rem); color:var(--amarillo); margin-top:10px; letter-spacing:.08em; text-shadow:0 0 18px rgba(255,214,10,.4); }

        model-viewer {
            width:min(90vw,520px); height:50vh;
            background:transparent; --poster-color:transparent;
            position:relative; z-index:2;
            animation:flotar 5s ease-in-out infinite;
            filter:drop-shadow(0 20px 40px rgba(230,57,70,.3));
        }
        @keyframes flotar {
            0%,100%{transform:translateY(0px) rotate(0deg)}
            25%{transform:translateY(-18px) rotate(1deg)}
            75%{transform:translateY(-10px) rotate(-1deg)}
        }

        .scroll-hint {
            position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
            display:flex; flex-direction:column; align-items:center; gap:6px;
            color:rgba(255,255,255,.3); font-size:.72rem; letter-spacing:.12em;
            text-transform:uppercase; animation:pulseFade 2.5s ease-in-out infinite; pointer-events:none;
        }
        .scroll-arrow { width:22px; height:22px; border-right:2px solid rgba(255,255,255,.3); border-bottom:2px solid rgba(255,255,255,.3); transform:rotate(45deg); }
        @keyframes pulseFade { 0%,100%{opacity:.4;transform:translateX(-50%) translateY(0)} 50%{opacity:1;transform:translateX(-50%) translateY(6px)} }

        canvas#bg { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.35; }
    </style>
</head>
<body>

<canvas id="bg"></canvas>
<header><div class="logo">Perros <span>Calientes</span> 🌭</div></header>

<!-- ══ ITEM 1 ══ -->
<section class="seccion-perro">
    <div class="num-fondo">01</div>
    <div class="info-perro">
        <div class="tag">⭐ Clásico</div>
        <h2>Perro Sencillo</h2>
        <p class="descripcion">Pan, salchicha, ripio de papa y salsas</p>
        <p class="precio">$5.000</p>
    </div>
    <model-viewer
        src="perro_sencillo.glb"
        alt="Perro Sencillo 3D"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        exposure="1"
        tone-mapping="commerce">
    </model-viewer>
</section>

<!-- ══ ITEM 2 ══ -->
<section class="seccion-perro">
    <div class="num-fondo">02</div>
    <div class="info-perro">
        <div class="tag" style="background:var(--neon)">🔥 Popular</div>
        <h2>Perro Especial</h2>
        <p class="descripcion">Pan, salchicha doble, papas, queso, tocineta y salsas gourmet</p>
        <p class="precio">$8.500</p>
    </div>
    <model-viewer
        src="perro_especial.glb"
        alt="Perro Especial 3D"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        exposure="1"
        tone-mapping="commerce">
    </model-viewer>
</section>

<div class="scroll-hint"><div class="scroll-arrow"></div><span>scroll</span></div>

<script>
const hint = document.querySelector('.scroll-hint');
window.addEventListener('scroll', () => {
    hint.style.opacity = window.scrollY > document.body.scrollHeight - innerHeight - 80 ? '0' : '';
});

const bgC = document.getElementById('bg');
const bx = bgC.getContext('2d');
let bW, bH, pts;
function bR(){bW=bgC.width=innerWidth;bH=bgC.height=innerHeight;}
function bI(){pts=Array.from({length:60},()=>({x:Math.random()*bW,y:Math.random()*bH,r:Math.random()*1.5+.4,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()}));}
function bD(){bx.clearRect(0,0,bW,bH);for(const p of pts){bx.beginPath();bx.arc(p.x,p.y,p.r,0,Math.PI*2);bx.fillStyle=`rgba(255,214,10,${p.a*.6})`;bx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>bW)p.dx*=-1;if(p.y<0||p.y>bH)p.dy*=-1;}requestAnimationFrame(bD);}
bR();bI();bD();window.addEventListener('resize',()=>{bR();bI();});
</script>
</body>
</html>
