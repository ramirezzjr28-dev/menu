<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perros Calientes 🌭</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Three.js r128 + OBJLoader + OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --rojo: #e63946;
            --amarillo: #ffd60a;
            --crema: #fff8e7;
            --oscuro: #0d0d0d;
            --neon: #ff6b35;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--oscuro);
            color: var(--crema);
            font-family: 'Barlow', sans-serif;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 40px;
            background: linear-gradient(to bottom, rgba(13,13,13,0.98), transparent);
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.12em;
            color: var(--amarillo);
            text-shadow: 0 0 20px rgba(255,214,10,0.5);
        }
        .logo span { color: var(--rojo); }

        /* ── SECCIONES ── */
        .seccion-perro {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 20px;
            position: relative;
            overflow: hidden;
        }
        .seccion-perro:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--rojo), transparent);
            box-shadow: 0 0 8px var(--rojo);
        }
        .num-fondo {
            position: absolute;
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(160px, 28vw, 320px);
            color: rgba(255,255,255,0.025);
            user-select: none;
            pointer-events: none;
            z-index: 0;
            line-height: 1;
        }
        .info-perro {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 10px;
        }
        .tag {
            display: inline-block;
            background: var(--rojo);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 12px;
        }
        h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            letter-spacing: 0.05em;
            line-height: 1;
            color: var(--crema);
            text-shadow: 2px 2px 0px var(--rojo);
        }
        .descripcion {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: rgba(255,248,231,0.65);
            margin-top: 8px;
            max-width: 420px;
            font-style: italic;
        }
        .precio {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: var(--amarillo);
            margin-top: 10px;
            letter-spacing: 0.08em;
            text-shadow: 0 0 18px rgba(255,214,10,0.4);
        }

        /* ── CANVAS 3D ── */
        .canvas-3d {
            width: min(90vw, 520px);
            height: 50vh;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 20px 40px rgba(230,57,70,0.3));
            animation: flotar 5s ease-in-out infinite;
        }
        .canvas-3d canvas { border-radius: 12px; }
        .canvas-3d.hidden { display: none; }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px);   }
            25%       { transform: translateY(-18px); }
            75%       { transform: translateY(-8px);  }
        }

        /* ── SPINNER ── */
        .loading-3d {
            width: min(90vw, 520px);
            height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            position: relative;
            z-index: 2;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,214,10,0.15);
            border-top-color: var(--amarillo);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-3d.hidden { display: none; }

        /* ── FALLBACK ── */
        .fallback {
            display: none;
            width: min(90vw, 320px);
            height: 50vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            animation: flotar 5s ease-in-out infinite;
            position: relative; z-index: 2;
        }
        .fallback .emoji { font-size: 5rem; }
        .fallback.visible { display: flex; }

        /* ── SCROLL HINT ── */
        .scroll-hint {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.3);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            animation: pulseFade 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        .scroll-arrow {
            width: 22px; height: 22px;
            border-right: 2px solid rgba(255,255,255,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.3);
            transform: rotate(45deg);
        }
        @keyframes pulseFade {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
            50%       { opacity: 1;   transform: translateX(-50%) translateY(6px); }
        }

        /* ── FONDO PARTÍCULAS ── */
        canvas#bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
    <div class="logo">Perros <span>Calientes</span> 🌭</div>
</header>

<!-- ══ ITEM 1 ══ -->
<section class="seccion-perro">
    <div class="num-fondo">01</div>
    <div class="info-perro">
        <div class="tag">⭐ Clásico</div>
        <h2>Perro Sencillo</h2>
        <p class="descripcion">Pan, salchicha, ripio de papa y salsas</p>
        <p class="precio">$5.000</p>
    </div>
    <div class="loading-3d" id="load1"><div class="spinner"></div><span>CARGANDO MODELO...</span></div>
    <div class="canvas-3d hidden" id="c3d1"></div>
    <div class="fallback" id="fb1"><span class="emoji">🌭</span><span>perro_sencillo.obj</span></div>
</section>

<!-- ══ ITEM 2 ══ -->
<section class="seccion-perro">
    <div class="num-fondo">02</div>
    <div class="info-perro">
        <div class="tag" style="background:var(--neon)">🔥 Popular</div>
        <h2>Perro Especial</h2>
        <p class="descripcion">Pan, salchicha doble, papas, queso, tocineta y salsas gourmet</p>
        <p class="precio">$8.500</p>
    </div>
    <div class="loading-3d" id="load2"><div class="spinner"></div><span>CARGANDO MODELO...</span></div>
    <div class="canvas-3d hidden" id="c3d2"></div>
    <div class="fallback" id="fb2"><span class="emoji">🌭</span><span>perro_especial.obj</span></div>
</section>

<div class="scroll-hint">
    <div class="scroll-arrow"></div>
    <span>scroll</span>
</div>

<script>
/* ═══════════════════════════════════════════════════
   VISOR OBJ con Three.js
   - MTLLoader carga el .mtl con texturas primero
   - OBJLoader carga el .obj y aplica los materiales
   - OrbitControls para rotar con el mouse
   - Auto-centrado y escalado automático
═══════════════════════════════════════════════════ */
function crearVisorOBJ(containerId, loadId, fbId, objPath) {
    const container = document.getElementById(containerId);
    const loadEl    = document.getElementById(loadId);
    const fb        = document.getElementById(fbId);

    const W = Math.min(window.innerWidth * 0.9, 520);
    const H = window.innerHeight * 0.50;

    // Escena
    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(45, W / H, 0.001, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 0);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    // Iluminación
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(4, 8, 6);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xff6b35, 0.4);
    fill.position.set(-6, -4, -4);
    scene.add(fill);
    const back = new THREE.DirectionalLight(0xffffff, 0.6);
    back.position.set(0, -5, -8);
    scene.add(back);

    // OrbitControls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.07;
    controls.autoRotate      = true;
    controls.autoRotateSpeed = 2.0;
    controls.enableZoom      = true;

    // Derivar ruta del .mtl desde el .obj  (mismo nombre, misma carpeta)
    const mtlPath = objPath.replace(/\.obj$/i, '.mtl');

    function montarOBJ(materials) {
        const objLoader = new THREE.OBJLoader();
        if (materials) {
            materials.preload();
            objLoader.setMaterials(materials);
        }
        objLoader.load(
            objPath,
            (obj) => {
                // Auto-centrar y escalar
                const box    = new THREE.Box3().setFromObject(obj);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                const scale  = 2.5 / Math.max(size.x, size.y, size.z);

                obj.scale.setScalar(scale);
                obj.position.set(
                    -center.x * scale,
                    -center.y * scale,
                    -center.z * scale
                );

                // Los .mtl no tienen texturas (exportados sin bake desde Blender)
                // Aplicamos materiales visuales atractivos por código
                const foodMaterials = [
                    new THREE.MeshStandardMaterial({ color: 0xc8833a, roughness: 0.7, metalness: 0.0 }), // pan dorado
                    new THREE.MeshStandardMaterial({ color: 0xa63c1a, roughness: 0.5, metalness: 0.0 }), // salchicha
                    new THREE.MeshStandardMaterial({ color: 0xe8d88a, roughness: 0.8, metalness: 0.0 }), // papa/ripio
                    new THREE.MeshStandardMaterial({ color: 0xf5f0c8, roughness: 0.4, metalness: 0.0 }), // salsas
                    new THREE.MeshStandardMaterial({ color: 0xd4522a, roughness: 0.4, metalness: 0.05 }), // tomate/ketchup
                    new THREE.MeshStandardMaterial({ color: 0x8ab04a, roughness: 0.6, metalness: 0.0 }), // mostaza/verde
                ];
                let matIdx = 0;
                obj.traverse(child => {
                    if (!child.isMesh) return;
                    child.material = foodMaterials[matIdx % foodMaterials.length];
                    matIdx++;
                });

                scene.add(obj);
                camera.position.set(0, 0.8, 5);
                controls.target.set(0, 0, 0);
                controls.update();

                loadEl.classList.add('hidden');
                container.classList.remove('hidden');

                (function animate() {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                })();
            },
            undefined,
            (err) => {
                console.warn('[OBJ] Error:', objPath, err);
                loadEl.classList.add('hidden');
                fb.classList.add('visible');
            }
        );
    }

    // Intentar cargar el .mtl primero; si no existe, cargar el .obj solo
    const mtlLoader = new THREE.MTLLoader();
    const basePath = objPath.substring(0, objPath.lastIndexOf('/') + 1) || './';
    mtlLoader.setPath(basePath);
    mtlLoader.load(
        mtlPath.replace(basePath, ''),
        (materials) => montarOBJ(materials),
        undefined,
        ()          => {
            console.info('[MTL] No se encontró .mtl, cargando .obj sin texturas');
            montarOBJ(null);
        }
    );
}

// ── Iniciar visores ──
crearVisorOBJ('c3d1', 'load1', 'fb1', 'perro_sencillo.obj');
crearVisorOBJ('c3d2', 'load2', 'fb2', 'perro_especial.obj');

/* ── Scroll hint ── */
const hint = document.querySelector('.scroll-hint');
window.addEventListener('scroll', () => {
    const max = document.body.scrollHeight - window.innerHeight;
    hint.style.opacity = window.scrollY > max - 80 ? '0' : '';
});

/* ── Partículas de fondo ── */
const bgCanvas = document.getElementById('bg');
const bctx = bgCanvas.getContext('2d');
let bW, bH, parts;

function bResize() {
    bW = bgCanvas.width  = window.innerWidth;
    bH = bgCanvas.height = window.innerHeight;
}
function bInit() {
    parts = Array.from({length: 60}, () => ({
        x: Math.random() * bW, y: Math.random() * bH,
        r: Math.random() * 1.5 + 0.4,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        a: Math.random()
    }));
}
function bDraw() {
    bctx.clearRect(0, 0, bW, bH);
    for (const p of parts) {
        bctx.beginPath();
        bctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        bctx.fillStyle = `rgba(255,214,10,${p.a * 0.6})`;
        bctx.fill();
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0 || p.x > bW) p.dx *= -1;
        if (p.y < 0 || p.y > bH) p.dy *= -1;
    }
    requestAnimationFrame(bDraw);
}
bResize(); bInit(); bDraw();
window.addEventListener('resize', () => { bResize(); bInit(); });
</script>
</body>
</html>
